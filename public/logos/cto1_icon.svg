<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="5 5 90 90">
  <defs>
    <linearGradient id="main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="60%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ ICON MARK ═══ -->
  <g transform="translate(10, 10)">

    <!-- Outer orbit ring (partial arc — the "C" shape) -->
    <!-- Arc from ~210° to ~150° clockwise (leaves opening on right) -->
    <path d="M 67 15 A 32 32 0 1 0 67 65" 
          stroke="url(#main-grad)" stroke-width="1.5" fill="none" 
          stroke-dasharray="none" stroke-linecap="round" opacity="0.4"/>

    <!-- Inner orbit ring -->
    <circle cx="50" cy="40" r="18" 
            stroke="url(#main-grad)" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="3 3"/>

    <!-- Central hub — the orchestration core -->
    <circle cx="50" cy="40" r="7" fill="url(#main-grad)" filter="url(#glow)"/>
    <circle cx="50" cy="40" r="3.5" fill="#050510"/>
    <circle cx="50" cy="40" r="1.5" fill="url(#main-grad)"/>

    <!-- 5 orbiting nodes — positioned around the C arc -->
    <!-- Node 1: top-right -->
    <circle cx="73" cy="18" r="4.5" fill="url(#main-grad)" filter="url(#subtle-glow)"/>
    <!-- Node 2: right -->
    <circle cx="80" cy="40" r="3.5" fill="url(#main-grad)" fill-opacity="0.9"/>
    <!-- Node 3: bottom-right -->
    <circle cx="73" cy="62" r="4.5" fill="url(#main-grad)" filter="url(#subtle-glow)"/>
    <!-- Node 4: top -->
    <circle cx="50" cy="8" r="3" fill="url(#main-grad)" fill-opacity="0.7"/>
    <!-- Node 5: bottom -->
    <circle cx="50" cy="72" r="3" fill="url(#main-grad)" fill-opacity="0.7"/>

    <!-- Connection lines: hub → nodes -->
    <line x1="55" y1="35" x2="70" y2="21" stroke="url(#main-grad)" stroke-width="1.2" stroke-opacity="0.6" stroke-linecap="round"/>
    <line x1="57" y1="40" x2="76.5" y2="40" stroke="url(#main-grad)" stroke-width="1.2" stroke-opacity="0.6" stroke-linecap="round"/>
    <line x1="55" y1="45" x2="70" y2="59" stroke="url(#main-grad)" stroke-width="1.2" stroke-opacity="0.6" stroke-linecap="round"/>
    <line x1="50" y1="33" x2="50" y2="11" stroke="url(#main-grad)" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round"/>
    <line x1="50" y1="47" x2="50" y2="69" stroke="url(#main-grad)" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round"/>

    <!-- Node-to-node connections (orchestration mesh) -->
    <line x1="73" y1="21" x2="80" y2="40" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="80" y1="40" x2="73" y2="59" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="50" y1="11" x2="73" y2="21" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.25"/>
    <line x1="73" y1="59" x2="50" y2="69" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.25"/>

  </g>

  <!-- ═══ WORDMARK ═══ -->
  <g transform="translate(115, 0)">
    <!-- CTO1 main wordmark -->
    <text x="0" y="58" 
          font-family="Arial Black, Helvetica Neue, sans-serif" 
          font-weight="900" 
          font-size="42" 
          letter-spacing="-1"
          fill="white">CTO<tspan fill="url(#text-grad)">1</tspan></text>

    <!-- Tagline -->
    <text x="2" y="74" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="9" 
          letter-spacing="3.5"
          fill="#8B8BAB"
          font-weight="400">CORE TECHNOLOGY ORCHESTRATION</text>
  </g>

</svg>