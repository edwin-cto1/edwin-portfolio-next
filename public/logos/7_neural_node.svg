<svg xmlns="http://www.w3.org/2000/svg" width="210" height="80" viewBox="0 0 210 80">
  <defs>
    <linearGradient id="g7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
  </defs>
  <!-- Neural "C" shape from dots and lines -->
  <circle cx="35" cy="15" r="4" fill="url(#g7)"/>
  <circle cx="18" cy="25" r="3.5" fill="url(#g7)" fill-opacity="0.8"/>
  <circle cx="14" cy="40" r="4" fill="url(#g7)"/>
  <circle cx="18" cy="55" r="3.5" fill="url(#g7)" fill-opacity="0.8"/>
  <circle cx="35" cy="65" r="4" fill="url(#g7)"/>
  <!-- Connections forming C -->
  <line x1="35" y1="19" x2="18" y2="23" stroke="url(#g7)" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="18" y1="28" x2="14" y2="37" stroke="url(#g7)" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="14" y1="43" x2="18" y2="52" stroke="url(#g7)" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="18" y1="58" x2="35" y2="63" stroke="url(#g7)" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Extra neural connections -->
  <circle cx="32" cy="40" r="3" fill="url(#g7)" fill-opacity="0.5"/>
  <line x1="18" y1="25" x2="32" y2="40" stroke="url(#g7)" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="32" y1="40" x2="18" y2="55" stroke="url(#g7)" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="14" y1="40" x2="32" y2="40" stroke="url(#g7)" stroke-width="1" stroke-opacity="0.4"/>
  <!-- TO1 text -->
  <text x="50" y="52" font-family="Arial Black,sans-serif" font-weight="900" font-size="30" fill="white">TO<tspan fill="url(#g7)">1</tspan></text>
</svg>