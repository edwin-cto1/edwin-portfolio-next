<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
  </defs>
  <!-- Circuit "1" shape -->
  <g transform="translate(10,10)">
    <line x1="20" y1="5" x2="20" y2="55" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="15" x2="20" y2="5" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="55" x2="35" y2="55" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
    <!-- Circuit nodes -->
    <circle cx="20" cy="5" r="3" fill="url(#g1)"/>
    <circle cx="10" cy="15" r="2.5" fill="url(#g1)" fill-opacity="0.7"/>
    <circle cx="20" cy="30" r="3" fill="url(#g1)"/>
    <circle cx="20" cy="55" r="3" fill="url(#g1)"/>
    <circle cx="5" cy="55" r="2" fill="url(#g1)" fill-opacity="0.6"/>
    <circle cx="35" cy="55" r="2" fill="url(#g1)" fill-opacity="0.6"/>
    <!-- Horizontal traces -->
    <line x1="20" y1="30" x2="35" y2="30" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="35" cy="30" r="2" fill="url(#g1)" fill-opacity="0.5"/>
  </g>
  <!-- CTO1 text -->
  <text x="60" y="50" font-family="monospace" font-weight="bold" font-size="28" fill="white">CTO<tspan fill="url(#g1)">1</tspan></text>
</svg>