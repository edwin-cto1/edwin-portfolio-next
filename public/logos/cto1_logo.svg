<svg xmlns="http://www.w3.org/2000/svg" width="440" height="80" viewBox="0 0 440 80">
  <defs>
    <linearGradient id="main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ICON MARK -->
  <g transform="translate(4, 4) scale(0.9)">
    <path d="M 67 15 A 32 32 0 1 0 67 65"
          stroke="url(#main-grad)" stroke-width="1.5" fill="none"
          stroke-linecap="round" opacity="0.5"/>
    <circle cx="50" cy="40" r="18"
            stroke="url(#main-grad)" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="3 3"/>
    <circle cx="50" cy="40" r="7" fill="url(#main-grad)" filter="url(#glow)"/>
    <circle cx="50" cy="40" r="3.5" fill="#050510"/>
    <circle cx="50" cy="40" r="1.5" fill="url(#main-grad)"/>
    <circle cx="73" cy="18" r="4.5" fill="url(#main-grad)" filter="url(#subtle-glow)"/>
    <circle cx="80" cy="40" r="3.5" fill="url(#main-grad)"/>
    <circle cx="73" cy="62" r="4.5" fill="url(#main-grad)" filter="url(#subtle-glow)"/>
    <circle cx="50" cy="8" r="3" fill="url(#main-grad)" opacity="0.8"/>
    <circle cx="50" cy="72" r="3" fill="url(#main-grad)" opacity="0.8"/>
    <line x1="55" y1="35" x2="70" y2="21" stroke="url(#main-grad)" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/>
    <line x1="57" y1="40" x2="76.5" y2="40" stroke="url(#main-grad)" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/>
    <line x1="55" y1="45" x2="70" y2="59" stroke="url(#main-grad)" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/>
    <line x1="50" y1="33" x2="50" y2="11" stroke="url(#main-grad)" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="50" y1="47" x2="50" y2="69" stroke="url(#main-grad)" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="73" y1="21" x2="80" y2="40" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="80" y1="40" x2="73" y2="59" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="50" y1="11" x2="73" y2="21" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="73" y1="59" x2="50" y2="69" stroke="url(#main-grad)" stroke-width="0.8" stroke-opacity="0.3"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(88, 0)">
    <!-- CTO in solid white -->
    <text x="0" y="52"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900"
          font-size="52"
          letter-spacing="-2"
          fill="#FFFFFF">CTO</text>
    <!-- 1 in solid electric blue -->
    <text x="124" y="52"
          font-family="Arial Black, Helvetica Neue, sans-serif"
          font-weight="900"
          font-size="52"
          fill="#00D4FF">1</text>
    <!-- Tagline -->
    <text x="3" y="68"
          font-family="Arial, Helvetica, sans-serif"
          font-size="12"
          letter-spacing="2.5"
          fill="#AAAACC"
          font-weight="500">CORE TECHNOLOGY ORCHESTRATION</text>
  </g>
</svg>
