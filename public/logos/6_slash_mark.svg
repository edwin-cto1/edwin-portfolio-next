<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
  </defs>
  <!-- CTO in white -->
  <text x="10" y="52" font-family="Arial Black,sans-serif" font-weight="900" font-size="34" fill="white">CTO</text>
  <!-- Slash in gradient -->
  <text x="102" y="52" font-family="Arial Black,sans-serif" font-weight="900" font-size="34" fill="url(#g6)">/</text>
  <!-- 1 in gradient -->
  <text x="124" y="52" font-family="Arial Black,sans-serif" font-weight="900" font-size="34" fill="url(#g6)">1</text>
