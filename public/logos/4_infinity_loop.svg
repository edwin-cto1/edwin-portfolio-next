<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B00FF"/>
    </linearGradient>
  </defs>
  <!-- Infinity shape using two circles -->
  <circle cx="28" cy="40" r="18" fill="none" stroke="url(#g4)" stroke-width="2.5"/>
  <circle cx="62" cy="40" r="18" fill="none" stroke="url(#g4)" stroke-width="2.5"/>
  <!-- CT in left loop -->
  <text x="28" y="45" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="white" text-anchor="middle">CT</text>
  <!-- O1 in right loop -->
  <text x="62" y="45" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="url(#g4)" text-anchor="middle">O1</text>
  <!-- Label -->
  <text x="95" y="36" font-family="Arial,sans-serif" font-weight="bold" font-size="18" letter-spacing="2" fill="white">CTO<tspan fill="url(#g4)">1</tspan></text>
  <text x="95" y="52" font-family="Arial,sans-serif" font-size="7.5" letter-spacing="2" fill="#8B8B9B">TECHNOLOGY LEADERSHIP</text>
</svg>